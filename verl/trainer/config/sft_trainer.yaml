data:
  train_batch_size: 256
  micro_batch_size: null # will be deprecated, use micro_batch_size_per_gpu
  micro_batch_size_per_gpu: 4  # this is also val batch size
  train_files: ~/data/gsm8k/train.parquet
  val_files: ~/data/gsm8k/test.parquet
  # Single-turn settings
  prompt_key: question
  response_key: answer
  prompt_dict_keys: ['question']
  response_dict_keys: ['answer']
  # Multi-turn settings
  multiturn:
    enable: false  # Set to true to use multi-turn dataset
    messages_key: messages  # Key for messages list in multi-turn mode
  max_length: 1024
  pad_to_max_length: true
  truncation: error
  balance_dp_token: False
  chat_template: null
  custom_cls:
    path: null
    name: null
  use_shm: False
model:
  partial_pretrain: ~/models/gemma-1.1-7b-it
  use_shm: False
  fsdp_config:
    wrap_policy:
      min_num_params: 0
    cpu_offload: False
    offload_params: False
  external_lib: null
  enable_gradient_checkpointing: False
  trust_remote_code: False
  lora_rank: 0  # Set to positive value to enable LoRA (e.g., 32)
  lora_alpha: 16  # LoRA scaling factor
  target_modules: all-linear  # Target modules for LoRA adaptation
  lora_target_scope: all  # all, llm, or llm_attention. llm* excludes vision/audio encoders, projectors, embeddings, and heads.
  lora_adapter_path: null  # Optional PEFT adapter path to use as LoRA initialization
  use_liger: False
  strategy: fsdp2
teacher:
  enable: false
  model_path: null
  lora_adapter_path: null
  external_lib: null
  trust_remote_code: True
  torch_dtype: bfloat16
  attn_implementation: flash_attention_2
distillation:
  loss_type: rkl  # fkl, rkl, jsd, jsd_0.7, skew_fkl, skew_rkl
  temperature: 1.0
  jsd_beta: 0.5
  skew_alpha: 0.1
  kd_coeff: 0.0  # loss = sft_loss + kd_coeff * kd_loss when non-zero
  kd_balancing_coeff: 0.0  # loss = (1 - coeff) * sft_loss + coeff * kd_loss when non-zero
beta_kd:
  losses: fkl  # comma/plus separated: fkl,rkl,js,tvd,mse_probs,mse_logits,cosine_probs,cosine_logits
  temperature: 1.0
  weighting: instance  # equal, task, instance
  weight_ce: false
  hidden_dim: 16
optim:
  lr: 1e-5
  betas: [0.9, 0.95]
  weight_decay: 0.01
  warmup_steps_ratio: 0.1
  clip_grad: 1.0
  lr_scheduler: cosine  # cosine, constant, or wsd
ulysses_sequence_parallel_size: 1
use_remove_padding: False
trainer:
  default_local_dir: /tmp/sft_model
  default_hdfs_dir: hdfs://tmp/experiments/gsm8k/gemma-1.1-7b-it/ # change the hdfs path here
  resume_path: null
  project_name: gsm8k-sft
  experiment_name: test
  total_epochs: 4
  total_training_steps: null
  save_freq: -1
  loss_validation_enable: true
  val_before_train: false
  test_freq: -1
  online_webshop_validation:
    enable: false
    freq: -1
    backend: hf
    num_episodes: 16
    goal_start: 500
    goal_end: 1000
    prompt_style: act_state
    history_length: 2
    max_steps: 15
    max_prompt_length: 8192
    max_new_tokens: 1024
    temperature: 0.4
    top_p: 1.0
    do_sample: true
    torch_dtype: bfloat16
    device: cuda
    trust_remote_code: true
    use_small: true
    human_goals: false
    ray_num_cpus: 2
    num_cpus_per_env_worker: 0.1
    output_dir: null
    cuda_visible_devices: null
  logger: ['console']
  seed: 1
